  - git diff --check
  - >-
    node -e "const fs=require('fs');const path=require('path');const arr=JSON.parse(fs.readFileSync('tasks/reports/script-classifications.json','utf8'));const SCOPED_ROOTS=['.githooks','.github/scripts','tests','tools/scripts','tasks/scripts'];const SCRIPT_EXTENSIONS=new Set(['.js','.cjs','.mjs','.ts','.tsx','.sh','.bash','.py']);function normalize(p){return p.split(path.sep).join('/')}function readFileSafe(p){try{return fs.readFileSync(p,'utf8')}catch{return ''}}function shouldExclude(repoPath){const p=normalize(repoPath);return p==='tools/scripts/archive'||p.startsWith('tools/scripts/archive/')||p.includes('/node_modules/')||p.startsWith('node_modules/')||p.includes('/.git/')||p.startsWith('.git/')||p.includes('/.venv/')||p.startsWith('.venv/')||p.includes('/tmp/')||p.startsWith('tmp/')||p.startsWith('notion/')||p.includes('.bak')||p.endsWith('.disabled')}function isScriptFile(repoPath){if(shouldExclude(repoPath)) return false;const ext=path.extname(repoPath).toLowerCase();if(SCRIPT_EXTENSIONS.has(ext)) return true;const c=readFileSafe(repoPath);return c.startsWith('#!/usr/bin/env')||c.startsWith('#!/bin/')}function walk(dir,out=[]){if(!fs.existsSync(dir)) return out;for(const entry of fs.readdirSync(dir,{withFileTypes:true})){const rel=normalize(path.join(dir,entry.name));if(shouldExclude(rel)) continue;if(entry.isDirectory()) walk(rel,out);else out.push(rel)}return out}const scripts=[...new Set(SCOPED_ROOTS.flatMap(r=>walk(r,[])).filter(isScriptFile))].sort();const classified=new Set(arr.map(x=>x.path));const missing=scripts.filter(p=>!classified.has(p));const stale=arr.map(x=>x.path).filter(p=>SCOPED_ROOTS.some(root=>p===root||p.startsWith(root+'/'))&&!fs.existsSync(p));const archived=arr.filter(x=>(x.path||'').includes('tools/scripts/archive/')).map(x=>x.path);if(missing.length||stale.length||archived.length){console.error(JSON.stringify({missing,stale,archived},null,2));process.exit(1)}"
