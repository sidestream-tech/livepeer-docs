name: Verify llms.txt Files

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  verify-llms-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: cd tools && npm install

      - name: Verify llms outputs
        run: node tools/scripts/generate-llms-files.js --check
