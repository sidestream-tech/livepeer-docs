name: Check Broken Links

on:
  pull_request:
    branches:
      - main

jobs:
  broken-links:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Limit scanner input to docs content and config needed for link resolution.
          sparse-checkout: |
            docs.json
            .mintignore
            v2
            snippets
            tools/scripts/snippets
          sparse-checkout-cone-mode: false
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Mintlify globally
        run: npm install -g mintlify

      - name: Fetch external snippets
        run: bash tools/scripts/snippets/fetch-external-docs.sh

      - name: Run broken-links check
        continue-on-error: true
        run: npx mintlify broken-links

      - name: Broken-links note
        if: always()
        run: |
          echo "Broken-links is advisory only (non-blocking) while legacy link cleanup is in progress." >> $GITHUB_STEP_SUMMARY
