name: EN-GB Style Homogenisation

on:
  workflow_dispatch:
    inputs:
      scope:
        description: 'Scope: full or changed'
        type: choice
        options:
          - changed
          - full
        default: changed

permissions:
  contents: write
  pull-requests: write

jobs:
  homogenise:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd tools && npm ci

      - name: Run style homogeniser
        run: node tools/scripts/style-and-language-homogenizer-en-gb.js --scope ${{ inputs.scope }}

      - name: Create PR with changes
        uses: peter-evans/create-pull-request@v7
        with:
          base: docs-v2
          title: 'chore: EN-GB style homogenisation'
          body: 'Automated style fixes from style-homogenise workflow'
          branch: chore/style-homogenise
          commit-message: 'chore: EN-GB style homogenisation'
