name: Codex Governance

on:
  pull_request:
    branches:
      - docs-v2

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  codex-governance:
    if: startsWith(github.head_ref, 'codex/')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base ref
        run: git fetch --no-tags --depth=1 origin ${{ github.base_ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies (tools)
        working-directory: tools
        run: npm install

      - name: Validate codex task contract + issue readiness + PR body
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: |
          node tools/scripts/validate-codex-task-contract.js \
            --branch "${GITHUB_HEAD_REF}" \
            --base-ref "${GITHUB_BASE_REF}" \
            --require-pr-body \
            --require-issue-state

      - name: Check codex PR overlap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: |
          node tools/scripts/check-codex-pr-overlap.js \
            --base-ref "${GITHUB_BASE_REF}" \
            --repo "${GITHUB_REPOSITORY}" \
            --head-branch "${GITHUB_HEAD_REF}" \
            --handoff-label "codex-handoff-approved"
