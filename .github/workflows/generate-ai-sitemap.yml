# NOTE: THIS GITHUB ACTION WILL ONLY RUN ON MAIN BRANCH.

name: Generate AI Sitemap

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  generate-ai-sitemap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: cd tools && npm install

      - name: Generate AI sitemap
        run: node tools/scripts/generate-ai-sitemap.js --write

      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code sitemap-ai.xml || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add sitemap-ai.xml
          git commit -m "Update AI sitemap - $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          git push
