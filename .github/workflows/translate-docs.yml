name: Docs Translation Pipeline

on:
  workflow_dispatch:
    inputs:
      languages:
        description: "Target languages (CSV)"
        required: true
        default: "es,fr,de"
        type: string
      scope_mode:
        description: "Translation scope mode"
        required: true
        type: choice
        options:
          - changed_since_ref
          - prefixes
          - paths_file
          - full_v2_nav
        default: changed_since_ref
      base_ref:
        description: "Git base ref for changed_since_ref mode"
        required: true
        default: "docs-v2"
        type: string
      prefixes:
        description: "Repo prefixes (CSV) for prefixes mode"
        required: false
        default: ""
        type: string
      paths_file:
        description: "Repo-relative file with explicit paths/routes for paths_file mode"
        required: false
        default: ""
        type: string
      max_pages:
        description: "Max pages per run"
        required: true
        default: "50"
        type: string
      force_retranslate:
        description: "Ignore source-hash skip and retranslate selected pages"
        required: true
        default: false
        type: boolean
      dry_run:
        description: "Plan/translate without writing files or opening a PR"
        required: true
        default: false
        type: boolean
      create_pr:
        description: "Open/update a PR when generated files change"
        required: true
        default: true
        type: boolean
      target_branch:
        description: "Base branch to run against and target for PR"
        required: true
        default: "docs-v2"
        type: string

concurrency:
  group: translate-docs-${{ github.event.inputs.target_branch || 'docs-v2' }}
  cancel-in-progress: false

jobs:
  translate-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    env:
      I18N_ARTIFACT_DIR: /tmp/i18n
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_HTTP_REFERER: ${{ vars.OPENROUTER_HTTP_REFERER || github.server_url }}
      OPENROUTER_APP_NAME: ${{ vars.OPENROUTER_APP_NAME || 'livepeer-docs-i18n' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.target_branch || 'docs-v2' }}

      - name: Fetch base ref (changed_since_ref mode)
        if: ${{ inputs.scope_mode == 'changed_since_ref' }}
        run: git fetch --no-tags --depth=1 origin ${{ github.event.inputs.base_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install tools dependencies
        working-directory: tools
        run: npm install

      - name: Run i18n unit tests (pipeline integrity)
        working-directory: tools
        run: npm run test:i18n

      - name: Prepare artifact directory
        run: mkdir -p "$I18N_ARTIFACT_DIR"

      - name: Preflight provider safety (non-dry runs)
        if: ${{ !inputs.dry_run }}
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const cfg = JSON.parse(fs.readFileSync('tools/i18n/config.json', 'utf8'));
          const provider = String(cfg?.provider?.name || '').trim().toLowerCase();
          if (provider === 'mock') {
            console.error('Refusing non-dry workflow run because tools/i18n/config.json provider.name is "mock".');
            process.exit(1);
          }
          console.log(`Provider preflight ok: ${provider || '(default openrouter)'}`);
          NODE

      - name: Run translation generation
        run: |
          set -euo pipefail
          ARGS=(
            --languages "${{ github.event.inputs.languages }}"
            --scope-mode "${{ github.event.inputs.scope_mode }}"
            --base-ref "${{ github.event.inputs.base_ref }}"
            --max-pages "${{ github.event.inputs.max_pages }}"
            --route-map "$I18N_ARTIFACT_DIR/route-map.json"
            --report-json "$I18N_ARTIFACT_DIR/translate-report.json"
          )
          if [ -n "${{ github.event.inputs.prefixes }}" ]; then
            ARGS+=(--prefixes "${{ github.event.inputs.prefixes }}")
          fi
          if [ -n "${{ github.event.inputs.paths_file }}" ]; then
            ARGS+=(--paths-file "${{ github.event.inputs.paths_file }}")
          fi
          if [ "${{ github.event.inputs.force_retranslate }}" = "true" ]; then
            ARGS+=(--force)
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          node tools/scripts/i18n/translate-docs.js "${ARGS[@]}"

      - name: Update docs.json localized language nodes
        if: ${{ !inputs.dry_run }}
        run: |
          set -euo pipefail
          node tools/scripts/i18n/generate-localized-docs-json.js \
            --write \
            --languages "${{ github.event.inputs.languages }}" \
            --route-map "$I18N_ARTIFACT_DIR/route-map.json" \
            --report-json "$I18N_ARTIFACT_DIR/docs-json-report.json"

      - name: Regenerate docs-index.json
        if: ${{ !inputs.dry_run }}
        run: node tools/scripts/generate-docs-index.js --write

      - name: Validate generated localized MDX
        if: ${{ !inputs.dry_run }}
        run: |
          set -euo pipefail
          node tools/scripts/i18n/validate-generated.js \
            --languages "${{ github.event.inputs.languages }}" \
            --route-map "$I18N_ARTIFACT_DIR/route-map.json" \
            --report-json "$I18N_ARTIFACT_DIR/validate-report.json"

      - name: Validate docs.json navigation
        if: ${{ !inputs.dry_run }}
        run: node tests/unit/docs-navigation.test.js

      - name: Detect generated changes
        id: diff
        if: ${{ !inputs.dry_run }}
        run: |
          if git diff --quiet -- docs.json docs-index.json v2/es v2/fr v2/cn; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build workflow summary
        if: always()
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const dir = process.env.I18N_ARTIFACT_DIR;
          const summaryPath = process.env.GITHUB_STEP_SUMMARY;
          const files = {
            translate: path.join(dir, 'translate-report.json'),
            docsJson: path.join(dir, 'docs-json-report.json'),
            validate: path.join(dir, 'validate-report.json')
          };
          function readJson(p) {
            try { return JSON.parse(fs.readFileSync(p, 'utf8')); } catch { return null; }
          }
          const translate = readJson(files.translate);
          const docsJson = readJson(files.docsJson);
          const validate = readJson(files.validate);
          const lines = [];
          lines.push('## Docs Translation Pipeline');
          lines.push('');
          if (translate) {
            if (translate.provider?.name) {
              lines.push(`- Provider: ${translate.provider.name}`);
            }
            lines.push(`- Scope pages: ${translate.scope?.selectedPages ?? 0}${translate.scope?.truncated ? ' (truncated)' : ''}`);
            if (translate.scope?.scopeMode) {
              lines.push(`- Scope mode: ${translate.scope.scopeMode}`);
            }
            lines.push(`- Languages: ${(translate.runtime?.languages || []).join(', ')}`);
            lines.push(`- Translated: ${translate.counts?.translated ?? 0}`);
            lines.push(`- Dry-run translated: ${translate.counts?.dryRunTranslated ?? 0}`);
            lines.push(`- Skipped up-to-date: ${translate.counts?.skippedUpToDate ?? 0}`);
            lines.push(`- Successful page-language pairs: ${translate.counts?.successfulPageLanguagePairs ?? 0}`);
            lines.push(`- Failures: ${translate.counts?.failed ?? 0}`);
            for (const warning of translate.warnings || []) {
              lines.push(`- Warning: ${warning}`);
            }
          } else {
            lines.push('- Translation report not available.');
          }
          if (docsJson) {
            lines.push('');
            lines.push('### docs.json');
            for (const row of docsJson.perLanguage || []) {
              const coverage = row.routeCoverageOverallPct ?? 'n/a';
              const scope = row.routeCoverageScope || 'unknown';
              lines.push(`- ${row.language}: labels=${row.translatedLabels}, routes rewritten=${row.rewrittenRoutes}, fallbacks=${row.fallbackRoutes}, coverage=${coverage}% (${scope})`);
              if (typeof row.fallbackRoutesWithinSelectedScope === 'number' || typeof row.fallbackRoutesOutsideSelectedScope === 'number') {
                lines.push(`  fallback split: selected=${row.fallbackRoutesWithinSelectedScope ?? 0}, outside=${row.fallbackRoutesOutsideSelectedScope ?? 0}`);
              }
              if (typeof row.rewrittenRoutesFromMockArtifacts === 'number') {
                lines.push(`  rewrites from mock artifacts: ${row.rewrittenRoutesFromMockArtifacts}`);
              }
              for (const warning of row.warnings || []) {
                lines.push(`  warning: ${warning}`);
              }
            }
            for (const warning of docsJson.warnings || []) {
              lines.push(`- docs.json warning: ${warning}`);
            }
          }
          if (validate) {
            lines.push('');
            lines.push('### Generated MDX Validation');
            lines.push(`- Checked: ${validate.checked}`);
            lines.push(`- Failures: ${validate.failures?.length || 0}`);
            if (typeof validate.mockArtifactsDetected === 'number') {
              lines.push(`- Mock artifacts detected: ${validate.mockArtifactsDetected}`);
            }
            if (typeof validate.artifactsMissingProvenance === 'number') {
              lines.push(`- Missing provenance: ${validate.artifactsMissingProvenance}`);
            }
            if (typeof validate.provenanceParseFailures === 'number') {
              lines.push(`- Provenance parse failures: ${validate.provenanceParseFailures}`);
            }
          }
          fs.appendFileSync(summaryPath, `${lines.join('\n')}\n`);
          NODE

      - name: Upload i18n artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-translation-artifacts-${{ github.run_id }}
          path: /tmp/i18n
          if-no-files-found: warn

      - name: Create PR with generated translations
        if: ${{ !inputs.dry_run && inputs.create_pr && steps.diff.outputs.changed == 'true' }}
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/i18n-${{ github.run_id }}
          base: ${{ github.event.inputs.target_branch || 'docs-v2' }}
          title: "chore(i18n): translate docs to ${{ github.event.inputs.languages }}"
          commit-message: "chore(i18n): update translated docs and docs.json [skip ci]"
          add-paths: |
            docs.json
            docs-index.json
            v2/es
            v2/fr
            v2/cn
          body: |
            Automated docs translation update.

            Run settings:
            - languages: `${{ github.event.inputs.languages }}`
            - scope_mode: `${{ github.event.inputs.scope_mode }}`
            - base_ref: `${{ github.event.inputs.base_ref }}`
            - prefixes: `${{ github.event.inputs.prefixes }}`
            - paths_file: `${{ github.event.inputs.paths_file }}`
            - max_pages: `${{ github.event.inputs.max_pages }}`
            - force_retranslate: `${{ github.event.inputs.force_retranslate }}`

            Validation run in workflow:
            - `tools` i18n unit tests
            - generated localized MDX parse validation
            - `tests/unit/docs-navigation.test.js`

      - name: No generated diff summary
        if: ${{ !inputs.dry_run && steps.diff.outputs.changed == 'false' }}
        run: echo "No docs.json/docs-index/v2 localized changes detected after translation run."
