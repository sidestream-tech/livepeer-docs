name: Question / Clarification
description: Ask a tracked question that needs maintainer clarification.
title: "[question]: <short summary>"
labels: ["docs-v2", "help wanted", "status: needs-triage", "type: question"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Select the primary area for this question.
      options:
        - area: home-about
        - area: community
        - area: developers
        - area: gateways
        - area: orchestrators
        - area: lpt-governance
        - area: resources
        - area: ci-cd
        - area: structure
        - area: multiple
    validations:
      required: true

  - type: input
    id: page_or_path
    attributes:
      label: Relevant page URL or file path
      description: Link the page/path most related to this question.
      placeholder: https://docs.livepeer.org/... or v2/pages/... 
    validations:
      required: true

  - type: textarea
    id: question
    attributes:
      label: Question
      description: State the question clearly and directly.
    validations:
      required: true

  - type: textarea
    id: attempted_research
    attributes:
      label: What you already checked
      description: List docs/links/commands already reviewed.
    validations:
      required: true

  - type: textarea
    id: blocker_context
    attributes:
      label: Blocking impact
      description: Describe what this question is blocking.
    validations:
      required: true

  - type: dropdown
    id: classification
    attributes:
      label: Classification
      description: Select issue severity/impact. This is separate from priority (maintainer scheduling).
      options:
        - classification: urgent
        - classification: high
        - classification: moderate
        - classification: minor
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: Select maintainer scheduling priority (separate from classification severity/impact).
      options:
        - priority: critical
        - priority: high
        - priority: medium
        - priority: low
    validations:
      required: true

  - type: textarea
    id: suggested_wording
    attributes:
      label: Suggested wording for clarification
      description: Optional text proposal to resolve ambiguity.
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Submission checks
      options:
        - label: I searched existing issues and did not find an equivalent question.
          required: true
        - label: I provided enough detail for maintainers to answer clearly.
          required: true
