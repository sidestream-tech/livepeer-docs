name: Feature Request (Docs/Site)
description: Request a new docs/site/platform guidance capability with clear acceptance criteria.
title: "[feature]: <short summary>"
labels: ["docs-v2", "help wanted", "status: needs-triage", "type: enhancement"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Select the primary area this request affects.
      options:
        - area: home-about
        - area: community
        - area: developers
        - area: gateways
        - area: orchestrators
        - area: lpt-governance
        - area: resources
        - area: ci-cd
        - area: structure
        - area: multiple
    validations:
      required: true

  - type: input
    id: page_or_path
    attributes:
      label: Affected page URL or file path
      description: Optional if request is broad.
      placeholder: https://docs.livepeer.org/... or v2/pages/... 
    validations:
      required: false

  - type: textarea
    id: problem_statement
    attributes:
      label: Problem statement
      description: What problem does this request solve?
    validations:
      required: true

  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed solution
      description: Describe the desired capability or change.
    validations:
      required: true

  - type: textarea
    id: user_benefit
    attributes:
      label: User benefit
      description: Who benefits and how?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What alternatives did you evaluate?
    validations:
      required: true

  - type: textarea
    id: requested_action
    attributes:
      label: Action requested from maintainers
      description: What specific action should maintainers take?
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria / done criteria
      description: Define completion checks for this request.
    validations:
      required: true

  - type: textarea
    id: scope_in
    attributes:
      label: Scope in (required for Codex implementation)
      description: List allowed file paths/prefixes to change.
      placeholder: |
        v2/community/
        docs.json
    validations:
      required: true

  - type: textarea
    id: scope_out
    attributes:
      label: Scope out (required for Codex implementation)
      description: List forbidden paths/prefixes, or write "none".
      placeholder: |
        v1/
        snippets/components/
    validations:
      required: true

  - type: textarea
    id: acceptance_checks
    attributes:
      label: Acceptance commands (required for Codex implementation)
      description: List commands expected to pass before merge.
      placeholder: |
        node tests/run-pr-checks.js --base-ref docs-v2
        node tests/integration/v2-link-audit.js --files v2/community/foo.mdx --strict
    validations:
      required: true

  - type: textarea
    id: risk_flags
    attributes:
      label: Risk flags (required for Codex implementation)
      description: Add zero or more from this set: new-route, navigation, generated-files, ci-impact, force-push-risk.
      placeholder: |
        new-route
        navigation
    validations:
      required: true

  - type: dropdown
    id: classification
    attributes:
      label: Classification
      description: Select issue severity/impact. This is separate from priority (maintainer scheduling).
      options:
        - classification: urgent
        - classification: high
        - classification: moderate
        - classification: minor
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: Select maintainer scheduling priority (separate from classification severity/impact).
      options:
        - priority: critical
        - priority: high
        - priority: medium
        - priority: low
    validations:
      required: true

  - type: textarea
    id: mockups_examples
    attributes:
      label: Mockups or examples
      description: Optional references from other docs/products.
    validations:
      required: false

  - type: textarea
    id: rollout_notes
    attributes:
      label: Rollout notes
      description: Optional sequencing or rollout constraints.
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Submission checks
      options:
        - label: I searched existing issues and did not find an equivalent request.
          required: true
        - label: I provided enough detail for maintainers to evaluate and implement.
          required: true
