name: Bug Report (Docs and Guidance)
description: Report broken behavior, incorrect instructions, command/output mismatch, or broken links/assets.
title: "[bug]: <short summary>"
labels: ["docs-v2", "help wanted", "status: needs-triage", "type: bug"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Select the primary area this issue affects.
      options:
        - area: home-about
        - area: community
        - area: developers
        - area: gateways
        - area: orchestrators
        - area: lpt-governance
        - area: resources
        - area: ci-cd
        - area: structure
        - area: multiple
    validations:
      required: true

  - type: input
    id: page_or_path
    attributes:
      label: Affected page URL or file path
      description: Include a public docs URL or repository path.
      placeholder: https://docs.livepeer.org/... or v2/pages/... 
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Run ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual result
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected result
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: User impact
      description: Who is affected and how severe is the impact?
    validations:
      required: true

  - type: textarea
    id: requested_action
    attributes:
      label: Action requested from maintainers
      description: What specific action should maintainers take?
    validations:
      required: true

  - type: dropdown
    id: classification
    attributes:
      label: Classification
      description: Select issue severity/impact. This is separate from priority (maintainer scheduling).
      options:
        - classification: urgent
        - classification: high
        - classification: moderate
        - classification: minor
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: Select maintainer scheduling priority (separate from classification severity/impact).
      options:
        - priority: critical
        - priority: high
        - priority: medium
        - priority: low
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment and versions
      description: OS, browser, Node/tool versions, network, SDK/CLI versions.
      placeholder: macOS 15.3, Chrome 122, Node 22, mainnet
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Logs and screenshots
      description: Paste error output and attach screenshots if available.
    validations:
      required: false

  - type: textarea
    id: suspected_root_cause
    attributes:
      label: Suspected root cause
      description: Optional hypothesis about what is causing the issue.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Submission checks
      options:
        - label: I searched existing issues and did not find an equivalent report.
          required: true
        - label: I provided enough detail for maintainers to reproduce and act.
          required: true
