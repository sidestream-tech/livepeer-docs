name: Docs Review
description: Review multiple documentation pages
title: "[DOCS-REVIEW]"
labels:
  - docs-review
  - docs-v2
  - help wanted

body:
  - type: textarea
    id: overall_feedback
    attributes:
      label: Overall feedback (required so GitHub stops whining)
      description: "You can leave this blank if you use the per-page sections below."
      render: markdown
  - type: markdown
    attributes:
      value: |
        ## 📄 Docs Review
        This is a meta review issue for batching feedback across multiple pages.
        Use child/actionable issues for page-level fixes and apply `classification:*` there.

        Below is the auto-generated review table:

        <!-- BEGIN AUTO-GENERATED TABLE -->
        # Docs Review Table (Auto-Generated)
        
        | Page | Section | Status | Content Feedback | UI/UX Feedback |
        |------|---------|--------|------------------|----------------|
        <!-- END AUTO-GENERATED TABLE -->

  # This stays EMPTY and gets filled with real textarea elements
  # inserted as actual YAML items (not markdown)
  # AUTO-GENERATED TEXTAREAS START
# AUTO-GENERATED TEXTAREAS END
