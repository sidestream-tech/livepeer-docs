<svg width="200" height="50" viewBox="0 0 200 50" xmlns="http://www.w3.org/2000/svg">

  <!-- Cube scaled to exactly 36 × 40 px -->
  <g transform="translate(0,5) scale(0.07)"> 
    <!-- Top Face -->
    <polygon 
      points="0,88 256,0 512,88 256,176" 
      fill="#F3B6C2" />
    <!-- Left Face -->
    <polygon 
      points="0,88 256,176 256,552 14,460" 
      fill="#D98DA0" />
    <!-- Right Face -->
    <polygon 
      points="512,88 256,176 256,552 497,460" 
      fill="#B57386" />
  </g>

  <!-- 12px gap → translated to x=48 (36 + 12) -->
  <text 
    x="48"
    y="32"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
    font-size="24"
    font-weight="500"
    fill="#FFFFFF">
    Streamplace
  </text>
</svg>
